<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeLinks – Result</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#050505;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow-x:hidden}
    .bg-wrap{position:fixed;inset:0;z-index:0}
    .bg-image{position:absolute;inset:-40px;background-image:url('/static/batman.jpg');background-size:cover;background-position:center;filter:blur(28px) brightness(0.18) saturate(0.9);transform:scale(1.1)}
    .bg-overlay{position:absolute;inset:0;background:radial-gradient(ellipse 90% 90% at 50% 50%,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.8) 100%)}
    .page{position:relative;z-index:2;width:100%;max-width:560px;margin:30px 20px}
    .back-btn{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,0.35);font-size:0.78rem;text-decoration:none;margin-bottom:16px;transition:color 0.2s}
    .back-btn:hover{color:#00e5a0}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div class="bg-wrap"><div class="bg-image"></div><div class="bg-overlay"></div></div>
<div class="page">
  <a class="back-btn" href="/">← Back to SafeLinks</a>
  <div id="RC"><p style="color:rgba(255,255,255,0.4);text-align:center;padding:40px">Loading...</p></div>
</div>
<script>
// ── GET DATA ──────────────────────────────────────────────────
var raw = sessionStorage.getItem('sl_result');
var lang = sessionStorage.getItem('sl_lang') || 'en';

if (!raw) {
  document.getElementById('RC').innerHTML =
    '<div style="text-align:center;padding:40px;">' +
    '<p style="color:rgba(255,255,255,0.4);margin-bottom:20px;">No scan data. Please scan a URL first.</p>' +
    '<button onclick="window.location.href=\'/\'" style="padding:12px 24px;background:linear-gradient(135deg,#00e0a0,#00b8d9);color:#000;border:none;border-radius:12px;font-size:0.9rem;font-weight:600;cursor:pointer;">← Go Scan a URL</button>' +
    '</div>';
} else {

var data = JSON.parse(raw);
var score = data.score || 0;
var domain = data.domain || '';
var flags = data.flags || [];
var isSafe = (data.verdict === 'SAFE');
var isQuick = (data.scan_mode === 'quick');

// ════════════════════════════════════════════════════════════════
// QUICK SCAN — Simple Clean Interface
// ════════════════════════════════════════════════════════════════
if (isQuick) {

var qColor = isSafe ? '#00e5a0' : '#ffaa00';
var qIcon = isSafe ? '✅' : '⚠️';
var qGrad = isSafe ? '#00b87a,#00e5a0' : '#e67e00,#ffaa00';
var qBord = isSafe ? '#00e5a0' : '#ffaa00';
var qBgIcon = isSafe ? 'rgba(0,229,160,0.1)' : 'rgba(255,170,0,0.1)';
var qBorderIcon = isSafe ? 'rgba(0,229,160,0.3)' : 'rgba(255,170,0,0.3)';

var qL = {
  en:{ts:'SAFE',tw:'SUSPICIOUS',ms:'Quick analysis found no major threats. This URL appears safe based on heuristic checks. No phishing keywords, suspicious TLD, brand impersonation, or URL shorteners detected. For a complete report including domain age verification, run a Full Scan.',mw:'Quick analysis detected suspicious characteristics. This URL may be unsafe. Run a Full Scan for a complete detailed report with domain age verification.',note:'⚡ Quick Scan completed — domain age not checked. Use Full Scan for a complete analysis.',sc:'THREAT SCORE',ri:'RISK',ht:'HTTPS',fl:'FLAGS',op:'Open URL Safely',ba:'← Scan Another URL',lo:'Low',me:'Medium',hi:'High'},
  ml:{ts:'സുരക്ഷിതം',tw:'സംശയാസ്പദം',ms:'ദ്രുത വിശകലനത്തിൽ പ്രധാന ഭീഷണികൾ കണ്ടെത്തിയില്ല. ഫിഷിംഗ് കീവേഡുകൾ, സംശയാസ്പദ TLD, ബ്രാൻഡ് ആൾമാറാട്ടം, URL ഷോർട്ടനർ — ഒന്നും കണ്ടെത്തിയില്ല. ഡൊമെയ്ൻ പ്രായം ഉൾപ്പെടെ സമ്പൂർണ്ണ റിപ്പോർട്ടിനായി പൂർണ്ണ സ്കാൻ ഉപയോഗിക്കുക.',mw:'ദ്രുത വിശകലനത്തിൽ സംശയാസ്പദ സ്വഭാവങ്ങൾ കണ്ടെത്തി. ഈ URL സുരക്ഷിതമല്ലായിരിക്കാം. കൂടുതൽ വിശദാംശങ്ങൾക്ക് പൂർണ്ണ സ്കാൻ നടത്തുക.',note:'⚡ ദ്രുത സ്കാൻ പൂർത്തിയായി — ഡൊമെയ്ൻ പ്രായം പരിശോധിച്ചില്ല. സമ്പൂർണ്ണ വിശകലനത്തിന് പൂർണ്ണ സ്കാൻ ഉപയോഗിക്കുക.',sc:'ഭീഷണി സ്കോർ',ri:'അപകടം',ht:'HTTPS',fl:'കണ്ടെത്തലുകൾ',op:'URL തുറക്കുക',ba:'← മറ്റൊരു URL',lo:'കുറഞ്ഞത്',me:'മധ്യം',hi:'ഉയർന്നത്'},
  hi:{ts:'सुरक्षित',tw:'संदिग्ध',ms:'त्वरित विश्लेषण में कोई बड़ा खतरा नहीं मिला। कोई फ़िशिंग कीवर्ड, संदिग्ध TLD, ब्रांड अनुकरण या URL शॉर्टनर नहीं। डोमेन आयु सहित पूर्ण रिपोर्ट के लिए पूर्ण स्कैन चलाएं।',mw:'त्वरित विश्लेषण में संदिग्ध विशेषताएं मिलीं। यह URL असुरक्षित हो सकता है। पूर्ण रिपोर्ट के लिए पूर्ण स्कैन चलाएं।',note:'⚡ त्वरित स्कैन — डोमेन आयु की जांच नहीं की गई।',sc:'खतरा स्कोर',ri:'जोखिम',ht:'HTTPS',fl:'संकेतक',op:'URL खोलें',ba:'← दूसरा URL',lo:'कम',me:'मध्यम',hi:'उच्च'},
  ta:{ts:'பாதுகாப்பானது',tw:'சந்தேகமானது',ms:'விரைவு பகுப்பாய்வில் முக்கிய அச்சுறுத்தல்கள் இல்லை. முழு அறிக்கைக்கு முழு ஸ்கேன் இயக்கவும்.',mw:'விரைவு பகுப்பாய்வில் சந்தேகமான பண்புகள் உள்ளன. முழு ஸ்கேன் இயக்கவும்.',note:'⚡ விரைவு ஸ்கேன் — டொமைன் வயது சரிபார்க்கப்படவில்லை.',sc:'அச்சுறுத்தல் மதிப்பெண்',ri:'அபாயம்',ht:'HTTPS',fl:'குறிகாட்டிகள்',op:'URL திற',ba:'← வேறொரு URL',lo:'குறைவு',me:'நடுத்தரம்',hi:'அதிகம்'},
  te:{ts:'సురక్షితం',tw:'సందేహాస్పదం',ms:'శీఘ్ర విశ్లేషణలో ప్రధాన బెదిరింపులు లేవు. పూర్తి నివేదికకు పూర్తి స్కాన్ చేయండి.',mw:'శీఘ్ర విశ్లేషణలో అనుమానాస్పద లక్షణాలు ఉన్నాయి. పూర్తి స్కాన్ చేయండి.',note:'⚡ శీఘ్ర స్కాన్ — డొమైన్ వయసు తనిఖీ చేయబడలేదు.',sc:'బెదిరింపు స్కోర్',ri:'ప్రమాదం',ht:'HTTPS',fl:'సూచికలు',op:'URL తెరవండి',ba:'← మరొక URL',lo:'తక్కువ',me:'మధ్యస్థం',hi:'అధికం'},
  kn:{ts:'ಸುರಕ್ಷಿತ',tw:'ಸಂಶಯಾಸ್ಪದ',ms:'ತ್ವರಿತ ವಿಶ್ಲೇಷಣೆಯಲ್ಲಿ ಯಾವುದೇ ಬೆದರಿಕೆಗಳಿಲ್ಲ. ಪೂರ್ಣ ಸ್ಕ್ಯಾನ್ ಚಲಾಯಿಸಿ.',mw:'ತ್ವರಿತ ವಿಶ್ಲೇಷಣೆಯಲ್ಲಿ ಸಂಶಯಾಸ್ಪದ ಗುಣಲಕ್ಷಣಗಳು ಕಂಡುಬಂದಿವೆ.',note:'⚡ ತ್ವರಿತ ಸ್ಕ್ಯಾನ್ — ಡೊಮೈನ್ ವಯಸ್ಸು ಪರಿಶೀಲಿಸಲಾಗಿಲ್ಲ.',sc:'ಬೆದರಿಕೆ ಸ್ಕೋರ್',ri:'ಅಪಾಯ',ht:'HTTPS',fl:'ಸೂಚಕಗಳು',op:'URL ತೆರೆಯಿರಿ',ba:'← ಮತ್ತೊಂದು URL',lo:'ಕಡಿಮೆ',me:'ಮಧ್ಯಮ',hi:'ಹೆಚ್ಚು'},
  fr:{ts:'SÉCURISÉ',tw:'SUSPECT',ms:'Analyse rapide: aucune menace détectée. Pour un rapport complet, lancez un scan complet.',mw:'Analyse rapide: caractéristiques suspectes détectées. Lancez un scan complet.',note:'⚡ Scan rapide — âge du domaine non vérifié.',sc:'Score de menace',ri:'Risque',ht:'HTTPS',fl:'Indicateurs',op:'Ouvrir URL',ba:'← Autre URL',lo:'Faible',me:'Moyen',hi:'Élevé'},
  de:{ts:'SICHER',tw:'VERDÄCHTIG',ms:'Schnellanalyse: Keine Bedrohungen erkannt. Für einen vollständigen Bericht führen Sie einen vollständigen Scan durch.',mw:'Schnellanalyse: Verdächtige Merkmale erkannt.',note:'⚡ Schnell-Scan — Domain-Alter nicht geprüft.',sc:'Bedrohungsscore',ri:'Risiko',ht:'HTTPS',fl:'Indikatoren',op:'URL öffnen',ba:'← Andere URL',lo:'Niedrig',me:'Mittel',hi:'Hoch'},
  es:{ts:'SEGURO',tw:'SOSPECHOSO',ms:'Análisis rápido: no se detectaron amenazas. Para un informe completo, ejecute un escaneo completo.',mw:'Análisis rápido: características sospechosas detectadas.',note:'⚡ Escaneo rápido — edad del dominio no verificada.',sc:'Puntuación',ri:'Riesgo',ht:'HTTPS',fl:'Indicadores',op:'Abrir URL',ba:'← Otra URL',lo:'Bajo',me:'Medio',hi:'Alto'},
  ar:{ts:'آمن',tw:'مشبوه',ms:'التحليل السريع: لم يتم اكتشاف تهديدات. للحصول على تقرير كامل، قم بإجراء فحص كامل.',mw:'التحليل السريع: تم اكتشاف خصائص مشبوهة.',note:'⚡ فحص سريع — لم يتم التحقق من عمر النطاق.',sc:'درجة التهديد',ri:'الخطر',ht:'HTTPS',fl:'المؤشرات',op:'فتح الرابط',ba:'← رابط آخر',lo:'منخفض',me:'متوسط',hi:'عالٍ'},
  zh:{ts:'安全',tw:'可疑',ms:'快速分析：未检测到威胁。如需完整报告，请运行完整扫描。',mw:'快速分析：检测到可疑特征。',note:'⚡ 快速扫描——未验证域名年龄。',sc:'威胁评分',ri:'风险',ht:'HTTPS',fl:'指标',op:'打开网址',ba:'← 其他网址',lo:'低',me:'中',hi:'高'},
  ja:{ts:'安全',tw:'不審',ms:'クイック分析：脅威は検出されませんでした。完全なレポートにはフルスキャンを実行してください。',mw:'クイック分析：疑わしい特性が検出されました。',note:'⚡ クイックスキャン — ドメイン年齢は未確認。',sc:'脅威スコア',ri:'リスク',ht:'HTTPS',fl:'指標',op:'URLを開く',ba:'← 別のURL',lo:'低',me:'中',hi:'高'},
  ru:{ts:'БЕЗОПАСНО',tw:'ПОДОЗРИТЕЛЬНО',ms:'Быстрый анализ: угроз не обнаружено. Для полного отчёта запустите полное сканирование.',mw:'Быстрый анализ: обнаружены подозрительные характеристики.',note:'⚡ Быстрое сканирование — возраст домена не проверен.',sc:'Оценка угрозы',ri:'Риск',ht:'HTTPS',fl:'Индикаторы',op:'Открыть URL',ba:'← Другой URL',lo:'Низкий',me:'Средний',hi:'Высокий'},
  pt:{ts:'SEGURO',tw:'SUSPEITO',ms:'Análise rápida: nenhuma ameaça detectada. Para um relatório completo, execute uma verificação completa.',mw:'Análise rápida: características suspeitas detectadas.',note:'⚡ Verificação rápida — idade do domínio não verificada.',sc:'Pontuação',ri:'Risco',ht:'HTTPS',fl:'Indicadores',op:'Abrir URL',ba:'← Outro URL',lo:'Baixo',me:'Médio',hi:'Alto'}
};

var q = qL[lang] || qL['en'];
var qRisk = score < 30 ? q.lo : score < 60 ? q.me : q.hi;
var qRiskCol = score < 30 ? '#00e5a0' : score < 60 ? '#ffaa00' : '#ff4444';
var qTitle = isSafe ? q.ts : q.tw;
var qMsg = isSafe ? q.ms : q.mw;

document.getElementById('RC').innerHTML =
  '<div style="background:rgba(12,12,12,0.72);border:1px solid rgba(255,255,255,0.07);border-radius:28px;padding:28px 24px;backdrop-filter:blur(80px);-webkit-backdrop-filter:blur(80px);box-shadow:0 50px 100px rgba(0,0,0,0.9);position:relative;overflow:hidden;animation:fadeUp 0.5s ease;">' +
  '<div style="position:absolute;top:-1px;left:12%;right:12%;height:2px;border-radius:999px;background:linear-gradient(90deg,transparent,'+qBord+',transparent);"></div>' +

  '<div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">' +
    '<div style="width:54px;height:54px;border-radius:14px;background:'+qBgIcon+';border:1px solid '+qBorderIcon+';display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0;">'+qIcon+'</div>' +
    '<div><div style="font-size:1.6rem;font-weight:700;color:'+qColor+';">'+qTitle+'</div>' +
    '<div style="font-size:0.75rem;color:rgba(255,255,255,0.35);margin-top:2px;">'+domain+'</div></div>' +
  '</div>' +

  '<div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:10px 14px;font-size:0.72rem;color:rgba(255,255,255,0.35);word-break:break-all;margin-bottom:16px;font-family:monospace;">'+data.url+'</div>' +

  '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:16px;margin-bottom:16px;">' +
    '<div style="font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:10px;">⚡ QUICK SCAN RESULT</div>' +
    '<p style="font-size:0.88rem;line-height:1.65;color:rgba(255,255,255,0.8);">'+qMsg+'</p>' +
  '</div>' +

  '<div style="margin-bottom:16px;">' +
    '<div style="display:flex;justify-content:space-between;font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:7px;"><span>'+q.sc+'</span><span style="color:'+qColor+';font-weight:700;">'+score+'/100</span></div>' +
    '<div style="height:5px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden;"><div id="QSB" style="height:100%;min-width:4px;border-radius:999px;background:linear-gradient(90deg,'+qGrad+');width:0%;transition:width 1.2s ease;"></div></div>' +
  '</div>' +

  '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;">' +
    '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px;">' +
      '<div style="font-size:0.58rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.2);margin-bottom:5px;">'+q.ri+'</div>' +
      '<div style="font-size:0.9rem;font-weight:600;color:'+qRiskCol+';">'+qRisk+'</div>' +
    '</div>' +
    '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px;">' +
      '<div style="font-size:0.58rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.2);margin-bottom:5px;">'+q.ht+'</div>' +
      '<div style="font-size:0.9rem;font-weight:600;color:'+(data.https?'#00e5a0':'#ff4444')+';">'+(data.https?'✓ Yes':'✗ No')+'</div>' +
    '</div>' +
    '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px;">' +
      '<div style="font-size:0.58rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.2);margin-bottom:5px;">'+q.fl+'</div>' +
      '<div style="font-size:0.9rem;font-weight:600;color:'+(flags.length>0?'#ffaa00':'#00e5a0')+';">'+flags.length+' Found</div>' +
    '</div>' +
  '</div>' +

  '<div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-left:3px solid '+qBord+';border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:0.78rem;color:rgba(255,255,255,0.4);">'+q.note+'</div>' +

  '<div style="display:flex;flex-direction:column;gap:10px;">' +
    (isSafe?'<button style="width:100%;padding:14px;border-radius:14px;border:none;cursor:pointer;background:linear-gradient(135deg,#00e0a0,#00b8d9);color:#000;font-family:Inter,sans-serif;font-size:0.9rem;font-weight:600;" onclick="window.open(\''+data.url+'\',\'_blank\')">✓ '+q.op+'</button>':'') +
    '<button style="width:100%;padding:14px;border-radius:14px;border:none;cursor:pointer;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);font-family:Inter,sans-serif;font-size:0.9rem;font-weight:600;" onclick="window.location.href=\'/\'">'+q.ba+'</button>' +
  '</div></div>';

setTimeout(function(){ var b=document.getElementById('QSB'); if(b) b.style.width=(score<2?2:score)+'%'; },200);

} else {

// ════════════════════════════════════════════════════════════════
// FULL SCAN — Detailed Interface with AI Description
// ════════════════════════════════════════════════════════════════
