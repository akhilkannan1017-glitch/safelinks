<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeLinks – Scan History</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#050505;color:#fff;min-height:100vh;position:relative;overflow-x:hidden}
    .bg-wrap{position:fixed;inset:0;z-index:0}
    .bg-image{position:absolute;inset:-40px;background-image:url('/static/batman.jpg');background-size:cover;background-position:center;filter:blur(28px) brightness(0.18) saturate(0.9);transform:scale(1.1)}
    .bg-overlay{position:absolute;inset:0;background:radial-gradient(ellipse 90% 90% at 50% 50%,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.8) 100%)}
    .page{position:relative;z-index:2;max-width:800px;margin:0 auto;padding:30px 20px 60px}

    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:gap}
    .back-btn{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,0.35);font-size:0.78rem;text-decoration:none;transition:color 0.2s}
    .back-btn:hover{color:#00e5a0}
    .page-title{font-size:1.4rem;font-weight:700;color:#fff}
    .page-sub{font-size:0.75rem;color:rgba(255,255,255,0.35);margin-top:2px}

    /* Stats */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
    .stat-card{
      background:rgba(12,12,12,0.72);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:18px;padding:16px;
      backdrop-filter:blur(40px);
      text-align:center;
    }
    .stat-num{font-size:1.8rem;font-weight:700;margin-bottom:4px}
    .stat-num.total{color:#00e5a0}
    .stat-num.safe{color:#00e5a0}
    .stat-num.susp{color:#ffaa00}
    .stat-num.danger{color:#ff4444}
    .stat-label{font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3)}

    /* Controls */
    .controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
    .search-box{
      display:flex;align-items:center;gap:8px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:10px;padding:8px 14px;flex:1;max-width:300px;
    }
    .search-box input{background:transparent;border:none;color:#fff;font-size:0.82rem;outline:none;width:100%}
    .search-box input::placeholder{color:rgba(255,255,255,0.2)}
    .filter-btns{display:flex;gap:6px}
    .filter-btn{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:8px;padding:6px 12px;
      color:rgba(255,255,255,0.5);font-size:0.75rem;cursor:pointer;
      transition:all 0.2s;font-family:'Inter',sans-serif;
    }
    .filter-btn.active{background:rgba(0,229,160,0.1);border-color:rgba(0,229,160,0.3);color:#00e5a0}
    .filter-btn:hover{background:rgba(255,255,255,0.07)}
    .clear-btn{
      background:rgba(255,60,60,0.08);
      border:1px solid rgba(255,60,60,0.2);
      border-radius:8px;padding:6px 12px;
      color:rgba(255,100,100,0.6);font-size:0.75rem;cursor:pointer;
      transition:all 0.2s;font-family:'Inter',sans-serif;
    }
    .clear-btn:hover{background:rgba(255,60,60,0.15);color:#ff6666}

    /* History list */
    .history-list{display:flex;flex-direction:column;gap:10px}
    .history-item{
      background:rgba(12,12,12,0.72);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:16px;padding:16px 18px;
      backdrop-filter:blur(40px);
      display:flex;align-items:center;gap:14px;
      cursor:pointer;transition:border-color 0.2s,background 0.2s;
      animation:fadeUp 0.3s ease;
    }
    .history-item:hover{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.1)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    .verdict-dot{
      width:40px;height:40px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      font-size:1.2rem;flex-shrink:0;
    }
    .verdict-dot.SAFE{background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.25)}
    .verdict-dot.SUSPICIOUS{background:rgba(255,170,0,0.1);border:1px solid rgba(255,170,0,0.25)}
    .verdict-dot.DANGEROUS{background:rgba(255,50,50,0.1);border:1px solid rgba(255,50,50,0.25)}

    .item-main{flex:1;min-width:0}
    .item-domain{font-size:0.9rem;font-weight:600;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-url{font-size:0.72rem;color:rgba(255,255,255,0.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .item-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
    .verdict-badge{
      font-size:0.65rem;font-weight:600;letter-spacing:1px;
      padding:3px 10px;border-radius:6px;
    }
    .verdict-badge.SAFE{background:rgba(0,229,160,0.1);color:#00e5a0}
    .verdict-badge.SUSPICIOUS{background:rgba(255,170,0,0.1);color:#ffaa00}
    .verdict-badge.DANGEROUS{background:rgba(255,50,50,0.1);color:#ff4444}
    .item-score{font-size:0.72rem;color:rgba(255,255,255,0.25)}
    .item-time{font-size:0.65rem;color:rgba(255,255,255,0.2)}
    .scan-mode-badge{
      font-size:0.6rem;letter-spacing:1px;padding:2px 7px;border-radius:4px;
      background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.3);
    }

    .empty-state{
      text-align:center;padding:60px 20px;
      color:rgba(255,255,255,0.25);
    }
    .empty-state .icon{font-size:3rem;margin-bottom:12px;opacity:0.4}
    .empty-state p{font-size:0.88rem}

    .loading-state{text-align:center;padding:40px;color:rgba(255,255,255,0.3);font-size:0.85rem}

    @media(max-width:600px){
      .stats-grid{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
<div class="bg-wrap"><div class="bg-image"></div><div class="bg-overlay"></div></div>
<div class="page">

  <div class="header">
    <div>
      <a class="back-btn" href="/">← Back to SafeLinks</a>
      <div class="page-title" style="margin-top:8px">📋 Scan History</div>
      <div class="page-sub">All URLs scanned on this device</div>
    </div>
    <button class="clear-btn" onclick="clearHistory()">🗑 Clear History</button>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-num total" id="statTotal">—</div><div class="stat-label">Total Scans</div></div>
    <div class="stat-card"><div class="stat-num safe" id="statSafe">—</div><div class="stat-label">Safe</div></div>
    <div class="stat-card"><div class="stat-num susp" id="statSusp">—</div><div class="stat-label">Suspicious</div></div>
    <div class="stat-card"><div class="stat-num danger" id="statDanger">—</div><div class="stat-label">Dangerous</div></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="search-box">
      <span style="color:rgba(255,255,255,0.2)">🔍</span>
      <input type="text" id="searchInput" placeholder="Search domain or URL..." oninput="filterHistory()"/>
    </div>
    <div class="filter-btns">
      <button class="filter-btn active" onclick="setFilter('ALL',this)">All</button>
      <button class="filter-btn" onclick="setFilter('SAFE',this)">✅ Safe</button>
      <button class="filter-btn" onclick="setFilter('SUSPICIOUS',this)">⚠️ Suspicious</button>
      <button class="filter-btn" onclick="setFilter('DANGEROUS',this)">🔴 Dangerous</button>
    </div>
  </div>

  <!-- History -->
  <div class="history-list" id="historyList">
    <div class="loading-state">Loading scan history...</div>
  </div>

</div>
<script>
var allHistory = [];
var currentFilter = 'ALL';

var verdictIcon = {SAFE:'✅', SUSPICIOUS:'⚠️', DANGEROUS:'☠️'};

function timeAgo(isoStr) {
  var now = new Date();
  var then = new Date(isoStr);
  var diff = Math.floor((now - then) / 1000);
  if(diff < 60) return diff + 's ago';
  if(diff < 3600) return Math.floor(diff/60) + 'm ago';
  if(diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

async function loadStats() {
  var res = await fetch('/api/stats');
  var s = await res.json();
  document.getElementById('statTotal').textContent = s.total_scans || 0;
  document.getElementById('statSafe').textContent = s.total_safe || 0;
  document.getElementById('statSusp').textContent = s.total_suspicious || 0;
  document.getElementById('statDanger').textContent = s.total_dangerous || 0;
}

async function loadHistory() {
  var res = await fetch('/api/history?limit=100');
  allHistory = await res.json();
  renderHistory();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderHistory();
}

function filterHistory() {
  renderHistory();
}

function renderHistory() {
  var search = document.getElementById('searchInput').value.toLowerCase();
  var filtered = allHistory.filter(function(item) {
    var matchFilter = currentFilter === 'ALL' || item.verdict === currentFilter;
    var matchSearch = !search ||
      item.url.toLowerCase().includes(search) ||
      item.domain.toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });

  var list = document.getElementById('historyList');
  if(filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>No scans found</p></div>';
    return;
  }

  list.innerHTML = filtered.map(function(item, idx) {
    var icon = verdictIcon[item.verdict] || '❓';
    var modeLabel = item.scan_mode === 'quick' ? '⚡ Quick' : '🛡 Full';
    var mlText = item.ml_confidence ? ' · ML: '+(item.ml_confidence*100).toFixed(0)+'%' : '';
    return '<div class="history-item" onclick="viewItem('+idx+')" style="animation-delay:'+idx*0.03+'s">' +
      '<div class="verdict-dot '+item.verdict+'">'+icon+'</div>' +
      '<div class="item-main">' +
        '<div class="item-domain">'+item.domain+'</div>' +
        '<div class="item-url">'+item.url+'</div>' +
      '</div>' +
      '<div class="item-right">' +
        '<span class="verdict-badge '+item.verdict+'">'+item.verdict+'</span>' +
        '<span class="item-score">Score: '+item.score+'/100'+mlText+'</span>' +
        '<span class="scan-mode-badge">'+modeLabel+'</span>' +
        '<span class="item-time">'+timeAgo(item.scanned_at)+'</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

function viewItem(idx) {
  var search = document.getElementById('searchInput').value.toLowerCase();
  var filtered = allHistory.filter(function(item) {
    var matchFilter = currentFilter === 'ALL' || item.verdict === currentFilter;
    var matchSearch = !search || item.url.toLowerCase().includes(search) || item.domain.toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });
  var item = filtered[idx];
  sessionStorage.setItem('sl_result', JSON.stringify(item));
  window.location.href = item.verdict === 'SAFE' ? '/result' : '/warning';
}

async function clearHistory() {
  if(!confirm('Clear all scan history? This cannot be undone.')) return;
  await fetch('/api/history/clear', {method:'POST'});
  allHistory = [];
  renderHistory();
  loadStats();
}

loadStats();
loadHistory();
</script>
</body>
</html>
